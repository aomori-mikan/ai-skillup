<!DOCTYPE html>
  <html lang="ja">

  <head>
    
<meta charset="UTF-8" />
<!-- 検索で引っかからないようにする -->
<meta name="robots"
      content="noindex,nofollow" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<!-- pagedata.jsonで出力されたタイトルを表示  -->
<meta name="description"
      content="AI Skill Upは、生成AIを活用した実践的なスキルを学べるオンラインスクールLPをコンセプトに制作した架空のWebサイトです。">
<meta property="og:image"
      content="./assets/images/image-ogp.png">
<title>講座申し込み|AI Skill Up</title>

<link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap"
  rel="stylesheet">
    <script type="module" crossorigin src="../assets/js/main.js"></script>
    <link rel="stylesheet" crossorigin href="../assets/css/style.css">
  </head>

  <body data-page="form">

    <header>
      <div class="c-header page">
        <a href="../index.html" class="c-header__logo">
          <img src="../assets/images/logo-renew2.svg" alt="AI Skill Up">
        </a>
      </div>
    </header>
    <!-- 中身 -->

    <main>
      <div class="form-header">
        <h1 class="stepper-title">講座申し込みフォーム</h1>
        <ol class="stepper">
          <li class="step active" aria-current="step">
            <div class="step-number">1</div>
            <div class="step-label">入力</div>
            <div class="visually-hidden">（現在、このステップです）</div>
          </li>
          <li class="step">
            <div class="step-number">2</div>
            <div class="step-label">確認</div>
          </li>
          <li class="step">
            <div class="step-number">3</div>
            <div class="step-label">完了</div>
          </li>
        </ol>
      </div>

      <form method="post" class="form-container">
        <div class="form-row">
          <div class="form-group name">
            <p id="name" class="label-title">
              氏名<span class="required">必須</span>
            </p>

            <div class="name-group">

              <div>
                <label for="lastName" class="sr-only">姓</label>
                <input type="text" id="lastName" name="lastName" autocomplete="family-name" required placeholder="例) 山田"
                  aria-describedby="lastNameError">
              </div>

              <div>
                <label for="firstName" class="sr-only">名</label>
                <input type="text" id="firstName" name="firstName" autocomplete="given-name" required
                  placeholder="例) 太郎" aria-describedby="firstNameError">
              </div>

            </div>
            <div class="error" id="lastNameError" role="alert" aria-live="assertive"></div>
            <div class="error" id="firstNameError" role="alert" aria-live="assertive"></div>
          </div>
        </div>


        <fieldset class="form-group select">
          <legend class="label-title">
            生年月日<span class="required">必須</span>
          </legend>

          <div class="birth-group">

            <label for="birthYear" class="sr-only">生年</label>
            <select id="birthYear" name="birthYear" autocomplete="bday-year" required aria-describedby="birthError">
              <option value="">年</option>
            </select>
            <span aria-hidden="true">年</span>

            <label for="birthMonth" class="sr-only">生月</label>
            <select id="birthMonth" name="birthMonth" autocomplete="bday-month" required aria-describedby="birthError">
              <option value="">月</option>
            </select>
            <span aria-hidden="true">月</span>

            <label for="birthDay" class="sr-only">生日</label>
            <select id="birthDay" name="birthDay" autocomplete="bday-day" required aria-describedby="birthError">
              <option value="">日</option>
            </select>
            <span aria-hidden="true">日</span>

          </div>

          <div class="error" id="birthError" role="alert" aria-live="assertive">
          </div>
        </fieldset>


        <div class="form-group">
          <label for="email" class="label-title">メールアドレス<span class="required">必須</span></label>
          <input type="email" id="email" name="email" autocomplete="email" required="required"
            placeholder="例) xxxxxxxxx@example.com" aria-describedby="emailError">
          <div class="error" id="emailError" role="alert" aria-live="assertive"></div>
        </div>

        <div class="form-group tel">
          <label for="phone" class="label-title">電話番号</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="例) 09012345678">
        </div>

        <div class="form-group select-course select">
          <label for="course" class="label-title">
            希望コース<span class="required">必須</span>
          </label>
          <select id="course" name="course" required aria-describedby="courseError">
            <option value="">選択してください</option>
            <option value="基礎コース">基礎コース</option>
            <option value="エンジニアコース">エンジニアコース</option>
          </select>
          <div class="error" id="courseError" role="alert" aria-live="assertive"></div>
        </div>

        <fieldset class="form-group">
          <legend class="label-title">サービスを知ったきっかけ</legend>

          <div class="checkbox-group">
            <div class="checkbox-item-wrap">
              <label class="checkbox-item">
                <input type="checkbox" name="source" value="チラシ">
                チラシ
              </label>
            </div>

            <div class="checkbox-item-wrap">
              <label class="checkbox-item">
                <input type="checkbox" name="source" value="Webサイト">
                Webサイト
              </label>
            </div>

            <div class="checkbox-item-wrap">
              <label class="checkbox-item">
                <input type="checkbox" name="source" value="口コミ">
                口コミ
              </label>
            </div>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="questions" class="label-title">その他質問</label>
          <textarea id="questions" name="questions" placeholder="例) サービス内容について。金額について。"></textarea>
        </div>

      </form>

      <div class="form-instruction">
        <p>サービスを利用するには利用規約への同意が必要です。<br><a href="#" target="_blank">利用規約<span
              class="visually-hidden">（新しいタブで開く）</span></a>をご確認ください。</p>
        <div class="checkbox-group">
          <label for="entry_user_policy_check">
            <input type="checkbox" id="entry_user_policy_check" name="entry[user_policy_check]" required="required"
              title="" value="1" aria-describedby="policyError">
            利用規約に同意する
          </label>
        </div>
        <div class="error" id="policyError" role="alert" aria-live="assertive"></div>
      </div>


      <div class="box_bottom">
        <button type="submit" class="btn btn-primary" onclick="validateAndSubmit()">入力内容を確認する</button>
      </div>

    </main>

    
  <footer class="footer">
    <div class="caution" role="note">
      <p>このサイトは体験用のダミーサイトです。<br class="sp_visible">NG例は
        <a href="https://aomori-mikan.github.io/ai-skillup-ng/" target="_blank" rel="noopener noreferrer" class="external">
          AI Skill Up_NG版<span class="visually-hidden">（新しいタブで開く）</span>
        </a>をご確認ください。
      </p>
    </div>

  </footer>


  </body>

  </html>
